# nodes/vps.host/compose.yml  (fixed)
x-service-defaults: &service_defaults
  networks:
    - edge

version: "3.9"

services:
  traefik:
    <<: *service_defaults
    extends:
      file: ../../services/traefik/compose.yml
      service: traefik
    healthcheck:
      test:
        - CMD-SHELL
        - traefik healthcheck --ping
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_USERS}"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"

  cloudflared:
    <<: *service_defaults
    extends:
      file: ../../services/cloudflared/compose.yml
      service: cloudflared
    environment:
      CF_TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN_VPS}
    networks: [edge]

  postgres:
    <<: *service_defaults
    extends:
      file: ../../services/postgres/compose.yml
      service: postgres
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    networks: [edge]

  mariadb:
    <<: *service_defaults
    extends:
      file: ../../services/mariadb/compose.yml
      service: mariadb
    networks: [edge]

  redis:
    <<: *service_defaults
    extends:
      file: ../../services/redis/compose.yml
      service: redis
    networks: [edge]

  # Infisical stack (harvested from /srv/infisical)
  infisical-db:
    <<: *service_defaults
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${INFISICAL_DB_USER:-infisical}
      POSTGRES_PASSWORD: ${INFISICAL_DB_PASSWORD}
      POSTGRES_DB: ${INFISICAL_DB_NAME:-infisical}
    volumes:
      - infisical_pg_data:/var/lib/postgresql/data
    networks: [edge]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${INFISICAL_DB_USER:-infisical}']
      interval: 10s
      timeout: 5s
      retries: 5

  infisical-redis:
    <<: *service_defaults
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    volumes:
      - infisical_redis_data:/data
    networks: [edge]

  infisical:
    <<: *service_defaults
    image: infisical/infisical:latest
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_started
    env_file:
      - ../../.workspace/.env
    environment:
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
      DB_CONNECTION_URI: postgres://${INFISICAL_DB_USER:-infisical}:${INFISICAL_DB_PASSWORD}@infisical-db:5432/${INFISICAL_DB_NAME:-infisical}
      REDIS_URL: redis://infisical-redis:6379
      SITE_URL: ${INFISICAL_PUBLIC_URL}
      NODE_ENV: production
      PORT: 8080
      PORT_SECURE: 443
      HTTPS_ENABLED: 'true'
      INFISICAL_FEATURE_WORKFLOWS: 'true'
    networks: [edge]
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsSL http://127.0.0.1:8080/api/status || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  infisical-nginx:
    <<: *service_defaults
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      infisical:
        condition: service_started
    volumes:
      - ./compose/infisical-nginx/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./compose/infisical-nginx/nginx/certs:/etc/nginx/certs:ro
    ports:
      - '80:80'
      - '443:443'
    networks: [edge]

  kong:
    <<: *service_defaults
    extends:
      file: ../../services/kong/compose.yml
      service: kong
    networks: [edge]

  clamav:
    <<: *service_defaults
    extends:
      file: ../../services/clamav/compose.yml
      service: clamav
    networks: [edge]

  gitea:
    <<: *service_defaults
    extends:
      file: ../../services/gitea/compose.yml
      service: gitea
    networks: [edge]

  ghost:
    <<: *service_defaults
    extends:
      file: ../../services/ghost/compose.yml
      service: ghost
    networks: [edge]

  wordpress:
    <<: *service_defaults
    extends:
      file: ../../services/wordpress/compose.yml
      service: wordpress
    networks: [edge]

  discourse:
    <<: *service_defaults
    extends:
      file: ../../services/discourse/compose.yml
      service: discourse
    networks: [edge]

  wikijs:
    <<: *service_defaults
    extends:
      file: ../../services/wikijs/compose.yml
      service: wikijs
    networks: [edge]

  linkstack:
    <<: *service_defaults
    extends:
      file: ../../services/linkstack/compose.yml
      service: linkstack
    networks: [edge]

  localai:
    <<: *service_defaults
    extends:
      file: ../../services/localai/compose.yml
      service: localai
    networks: [edge]

  openwebui:
    <<: *service_defaults
    extends:
      file: ../../services/openwebui/compose.yml
      service: openwebui
    networks: [edge]

  node-red:
    <<: *service_defaults
    extends:
      file: ../../services/node-red/compose.yml
      service: node-red
    volumes:
      - node_red_data:/data
    networks: [edge]

volumes:
  node_red_data: {}
  postgres_data: {}
  mariadb_data: {}
  redis_data: {}
  traefik_letsencrypt: {}
  cloudflared_etc: {}
  gitea_data: {}
  ghost_content: {}
  wordpress_html: {}
  discourse_data: {}
  linkstack_data: {}
  localai_models: {}
  openwebui_data: {}
  clamav_data: {}
  clamav_logs: {}
  kong_tmp: {}
  infisical_pg_data: {}
  infisical_redis_data: {}

networks:
  edge:
    external: true