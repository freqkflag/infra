# nodes/vps.host/compose.yml  (fixed)
x-service-defaults: &service_defaults
  networks:
    - edge

version: "3.9"

services:
  traefik:
    <<: *service_defaults
    extends:
      file: ../../services/traefik/compose.yml
      service: traefik
    healthcheck:
      test:
        - CMD-SHELL
        - traefik healthcheck --ping
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_USERS}"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"

  cloudflared:
    <<: *service_defaults
    extends:
      file: ../../services/cloudflared/compose.yml
      service: cloudflared
    environment:
      CF_TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN_VPS}
    networks: [edge]

  postgres:
    <<: *service_defaults
    extends:
      file: ../../services/postgres/compose.yml
      service: postgres
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    networks: [edge]

  mariadb:
    <<: *service_defaults
    extends:
      file: ../../services/mariadb/compose.yml
      service: mariadb
    networks: [edge]

  redis:
    <<: *service_defaults
    extends:
      file: ../../services/redis/compose.yml
      service: redis
    networks: [edge]

  infisical:
    <<: *service_defaults
    extends:
      file: ../../services/infisical/compose.yml
      service: infisical
    networks: [edge]

  kong:
    <<: *service_defaults
    extends:
      file: ../../services/kong/compose.yml
      service: kong
    networks: [edge]

  clamav:
    <<: *service_defaults
    extends:
      file: ../../services/clamav/compose.yml
      service: clamav
    networks: [edge]

  gitea:
    <<: *service_defaults
    extends:
      file: ../../services/gitea/compose.yml
      service: gitea
    networks: [edge]

  ghost:
    <<: *service_defaults
    extends:
      file: ../../services/ghost/compose.yml
      service: ghost
    networks: [edge]

  wordpress:
    <<: *service_defaults
    extends:
      file: ../../services/wordpress/compose.yml
      service: wordpress
    networks: [edge]

  discourse:
    <<: *service_defaults
    extends:
      file: ../../services/discourse/compose.yml
      service: discourse
    networks: [edge]

  wikijs:
    <<: *service_defaults
    extends:
      file: ../../services/wikijs/compose.yml
      service: wikijs
    networks: [edge]

  linkstack:
    <<: *service_defaults
    extends:
      file: ../../services/linkstack/compose.yml
      service: linkstack
    networks: [edge]

  localai:
    <<: *service_defaults
    extends:
      file: ../../services/localai/compose.yml
      service: localai
    networks: [edge]

  openwebui:
    <<: *service_defaults
    extends:
      file: ../../services/openwebui/compose.yml
      service: openwebui
    networks: [edge]

  node-red:
    <<: *service_defaults
    extends:
      file: ../../services/node-red/compose.yml
      service: node-red
    volumes:
      - node_red_data:/data
    networks: [edge]

volumes:
  node_red_data: {}
  postgres_data: {}
  mariadb_data: {}
  redis_data: {}
  traefik_letsencrypt: {}
  cloudflared_etc: {}
  gitea_data: {}
  ghost_content: {}
  wordpress_html: {}
  discourse_data: {}
  linkstack_data: {}
  localai_models: {}
  openwebui_data: {}
  clamav_data: {}
  clamav_logs: {}
  kong_tmp: {}

networks:
  edge:
    external: true